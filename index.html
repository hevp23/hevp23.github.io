  // Guardamos el idioma actual de la página ('es' por defecto)
  let idiomaActual = 'es';

function actualizarReloj() {
    const fechaHora = new Date();
    
    // Detectamos si la página está en inglés viendo si algún elemento cambió a inglés (como "Community")
    // O podemos revisar el idioma del navegador / atributo lang de la página
    const esIngles = document.documentElement.lang === 'en' || 
                     document.getElementById('txt-comunidad').innerText.toLowerCase() === 'community';
    
    const idioma = esIngles ? 'en-US' : 'es-ES';

    // Opciones para formatear la fecha según el idioma
    const opcionesFecha = { 
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
    };

    // Obtenemos la fecha formateada en el idioma correcto
    let fechaFormateada = fechaHora.toLocaleDateString(idioma, opcionesFecha);
    
    // Si estamos en español, ponemos la primera letra del día en mayúscula por estética
    if (!esIngles) {
        fechaFormateada = fechaFormateada.charAt(0).toUpperCase() + fechaFormateada.slice(1);
    }

    // Obtenemos la hora actual
    const horaFormateada = fechaHora.toLocaleTimeString(idioma);

    // Lo inyectamos en tus contenedores del reloj
    document.getElementById('fecha-actual').innerText = fechaFormateada;
    document.getElementById('reloj-actual').innerText = horaFormateada;
}
