<script>
  // Guardamos el idioma actual de la página ('es' por defecto)
  let idiomaActual = 'es';

  function actualizarReloj() {
    const ahora = new Date();
    let fechaTexto = "";

    if (idiomaActual === 'es') {
      // Fecha en Español
      const opcionesFecha = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
      fechaTexto = ahora.toLocaleDateString('es-ES', opcionesFecha);
      
      // Primera letra a mayúscula
      let palabras = fechaTexto.split(' ');
      palabras[0] = palabras[0].charAt(0).toUpperCase() + palabras[0].slice(1);
      if (palabras[3]) {
        palabras[3] = palabras[3].charAt(0).toUpperCase() + palabras[3].slice(1);
      }
      fechaTexto = palabras.join(' ');
    } else {
      // Fecha en Inglés: "Friday, July 17, 2026"
      const opcionesFecha = { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' };
      fechaTexto = ahora.toLocaleDateString('en-US', opcionesFecha);
    }

    // --- CÓDIGO PARA EL RELOJ DE 12 HORAS ---
    let horas = ahora.getHours();
    const minutos = String(ahora.getMinutes()).padStart(2, '0');
    const segundos = String(ahora.getSeconds()).padStart(2, '0');
    const ampm = horas >= 12 ? 'PM' : 'AM';

    horas = horas % 12;
    horas = horas ? horas : 12;

    const horaTexto = `${horas}:${minutos}:${segundos} ${ampm}`;

    // Meter los datos en la pantalla
    document.getElementById('fecha-actual').textContent = fechaTexto;
    document.getElementById('reloj-actual').textContent = horaTexto;
  }

  // Ejecutar el reloj de inmediato y cada segundo
  actualizarReloj();
  setInterval(actualizarReloj, 1000);

  // Función para abrir y cerrar el menú de banderas
  function toggleMenu() {
    var menu = document.getElementById("menu-idiomas");
    menu.classList.toggle("show");
  }

  // Función principal que cambia los textos de los botones al inglés
  function cambiarIdioma(lang, flag) {
    idiomaActual = lang;
    
    // Cambia el emoji del botón principal
    document.getElementById("btn-idioma").textContent = flag;
    
    // Forzamos al reloj a actualizarse con el nuevo idioma al instante
