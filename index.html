<script>
  let idiomaActual = 'es';

  function actualizarReloj() {
      const fechaHora = new Date();
      const esIngles = idiomaActual === 'en';
      const idioma = esIngles ? 'en-US' : 'es-ES';

      const opcionesFecha = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      let fechaFormateada = fechaHora.toLocaleDateString(idioma, opcionesFecha);
      fechaFormateada = fechaFormateada.charAt(0).toUpperCase() + fechaFormateada.slice(1);

      const opcionesHora = { hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: true };
      let horaFormateada = fechaHora.toLocaleTimeString(idioma, opcionesHora);
      horaFormateada = horaFormateada.replace(/p\.?\s*m\.?/gi, 'PM').replace(/a\.?\s*m\.?/gi, 'AM');

      document.getElementById('fecha-actual').innerText = fechaFormateada;
      document.getElementById('reloj-actual').innerText = horaFormateada;
  }

  setInterval(actualizarReloj, 1000);

  function alternarIdioma() {
      const bandera = document.getElementById("icono-bandera");
      const texto = document.getElementById("texto-idioma");

      if (idiomaActual === 'es') {
          idiomaActual = 'en';
          bandera.innerText = "🇬🇧";
          texto.innerText = "English";
      } else {
          idiomaActual = 'es';
          bandera.innerText = "🇪🇸";
          texto.innerText = "Español";
      }

      // Traducir los botones
      const elementos = document.querySelectorAll('.boton-enlace span');
      elementos.forEach(el => {
          if (idiomaActual === 'en') {
              if (el.getAttribute('data-en')) el.innerText = el.getAttribute('data-en');
          } else {
              if (el.getAttribute('data-es')) el.innerText = el.getAttribute('data-es');
          }
      });

      actualizarReloj();
  }

  actualizarReloj();
</script>
